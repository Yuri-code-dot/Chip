<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Silicon Canvas — Chip Designer</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Special+Elite&family=Share+Tech+Mono&family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap');

:root {
  --paper: #f3eeff;
  --paper2: #e8ddf7;
  --paper3: #ddd0f5;
  --ink: #1a0a2e;
  --ink2: #3d2068;
  --accent: #7c3aed;
  --accent2: #a855f7;
  --accent3: #c084fc;
  --trace: #6d28d9;
  --faint: rgba(124,58,237,0.07);
  --faint2: rgba(124,58,237,0.13);
  --grid: rgba(124,58,237,0.08);
  --shadow: rgba(109,40,217,0.2);
  --border: #7c3aed;
  --block-stroke: #3d2068;
  --label: #1a0a2e;
  --sublabel: #5b21b6;
  --sidebar-bg: #f0e8ff;
  --sidebar-border: #c4b5fd;
  --toolbar-bg: #ede0ff;
  --bg: #f8f4ff;
  --wire-color: #6d28d9;
  --wire-hover: #a855f7;
  --selected: #7c3aed;
  --delete-red: #dc2626;
}
[data-theme="dark"] {
  --paper: #0d0618;
  --paper2: #130824;
  --paper3: #1a0d2e;
  --ink: #e8d5ff;
  --ink2: #c4b5fd;
  --accent: #a855f7;
  --accent2: #7c3aed;
  --accent3: #6d28d9;
  --trace: #c084fc;
  --faint: rgba(168,85,247,0.05);
  --faint2: rgba(168,85,247,0.1);
  --grid: rgba(168,85,247,0.08);
  --shadow: rgba(168,85,247,0.3);
  --border: #7c3aed;
  --block-stroke: #c084fc;
  --label: #e8d5ff;
  --sublabel: #a78bfa;
  --sidebar-bg: #0d0618;
  --sidebar-border: #3d2068;
  --toolbar-bg: #130824;
  --bg: #080412;
  --wire-color: #c084fc;
  --wire-hover: #e879f9;
  --selected: #c084fc;
  --delete-red: #f87171;
}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:'Courier Prime',monospace;transition:background 0.6s,color 0.6s;}

/* ── LAYOUT ── */
#app{display:flex;flex-direction:column;height:100vh;width:100vw;}

/* ── TOOLBAR ── */
#toolbar{
  display:flex;align-items:center;gap:6px;padding:7px 10px;
  background:var(--toolbar-bg);border-bottom:1.5px solid var(--border);
  flex-shrink:0;overflow-x:auto;scrollbar-width:none;
  transition:background 0.6s,border-color 0.6s;
  z-index:100;
}
#toolbar::-webkit-scrollbar{display:none;}

.tb-title{
  font-family:'Special Elite',cursive;font-size:13px;letter-spacing:3px;
  color:var(--accent);white-space:nowrap;margin-right:6px;
  transition:color 0.6s;
}

.tb-btn{
  font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:1px;
  padding:5px 10px;border:1px solid var(--border);background:transparent;
  color:var(--accent);cursor:pointer;text-transform:uppercase;white-space:nowrap;
  transition:all 0.2s;border-radius:1px;
}
.tb-btn:hover{background:var(--faint2);}
.tb-btn.active{background:var(--accent);color:var(--paper);border-color:var(--accent);}
.tb-btn.danger{border-color:var(--delete-red);color:var(--delete-red);}
.tb-btn.danger:hover{background:var(--delete-red);color:#fff;}

.tb-sep{width:1px;height:24px;background:var(--border);opacity:0.3;flex-shrink:0;}

#status-bar{
  font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:1px;
  color:var(--sublabel);white-space:nowrap;margin-left:auto;
  transition:color 0.6s;
}

/* ── MAIN ── */
#main{display:flex;flex:1;overflow:hidden;}

/* ── SIDEBAR ── */
#sidebar{
  width:160px;flex-shrink:0;background:var(--sidebar-bg);
  border-right:1.5px solid var(--sidebar-border);
  display:flex;flex-direction:column;overflow:hidden;
  transition:background 0.6s,border-color 0.6s;
  z-index:50;
}
.sidebar-header{
  padding:8px 10px;border-bottom:1px solid var(--sidebar-border);
  font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:2px;
  color:var(--accent);text-transform:uppercase;
  transition:color 0.6s,border-color 0.6s;
}
#block-list{flex:1;overflow-y:auto;padding:4px;scrollbar-width:thin;scrollbar-color:var(--accent) transparent;}
#block-list::-webkit-scrollbar{width:3px;}
#block-list::-webkit-scrollbar-thumb{background:var(--accent);opacity:0.4;}

.block-category{
  font-family:'Share Tech Mono',monospace;font-size:7px;letter-spacing:2px;
  color:var(--accent);text-transform:uppercase;padding:6px 4px 3px;
  border-bottom:1px solid var(--sidebar-border);margin-bottom:2px;
  transition:color 0.6s;
}

.block-item{
  display:flex;align-items:center;gap:6px;padding:5px 6px;
  cursor:grab;border:1px solid transparent;border-radius:1px;
  transition:all 0.15s;margin-bottom:1px;
  user-select:none;
}
.block-item:hover{border-color:var(--border);background:var(--faint2);}
.block-item:active{cursor:grabbing;}

.bi-swatch{
  width:12px;height:12px;border:1px solid var(--block-stroke);flex-shrink:0;
  transition:border-color 0.6s;
}
.bi-label{
  font-family:'Share Tech Mono',monospace;font-size:8px;
  color:var(--label);letter-spacing:0.5px;line-height:1.2;
  transition:color 0.6s;
}

/* ── CANVAS AREA ── */
#canvas-wrap{flex:1;position:relative;overflow:hidden;background:var(--paper);transition:background 0.6s;}

/* grid */
#canvas-wrap::before{
  content:'';position:absolute;inset:0;
  background-image:linear-gradient(var(--grid) 1px,transparent 1px),linear-gradient(90deg,var(--grid) 1px,transparent 1px);
  background-size:24px 24px;pointer-events:none;z-index:0;transition:background-size 0.3s;
}

#svg-canvas{
  position:absolute;inset:0;width:100%;height:100%;
  cursor:crosshair;z-index:1;overflow:visible;
}

/* ── BLOCK STYLES ── */
.chip-block{cursor:move;}
.chip-block:hover .block-rect{filter:brightness(0.97);}
.chip-block.selected .block-rect{stroke:var(--selected)!important;stroke-width:2!important;}
.chip-block.selected .block-inner{stroke:var(--selected)!important;opacity:0.7;}

/* ── WIRE ── */
.wire-path{stroke:var(--wire-color);stroke-width:1.5;fill:none;cursor:pointer;transition:stroke 0.3s;}
.wire-path:hover{stroke:var(--wire-hover);stroke-width:2.5;}
.wire-preview{stroke:var(--accent2);stroke-width:1.2;fill:none;stroke-dasharray:5,3;pointer-events:none;}

/* ── TOOLTIP / INSPECTOR ── */
#inspector{
  position:absolute;right:10px;top:10px;width:190px;
  background:var(--toolbar-bg);border:1.5px solid var(--border);
  padding:10px;z-index:200;display:none;
  transition:background 0.6s,border-color 0.6s;
  box-shadow:4px 4px 0 var(--shadow);
}
#inspector .ins-title{
  font-family:'Special Elite',cursive;font-size:11px;color:var(--accent);
  letter-spacing:2px;border-bottom:1px solid var(--border);padding-bottom:5px;margin-bottom:7px;
}
.ins-row{display:flex;justify-content:space-between;margin-bottom:4px;}
.ins-key{font-family:'Share Tech Mono',monospace;font-size:8px;color:var(--sublabel);letter-spacing:1px;}
.ins-val{font-family:'Courier Prime',monospace;font-size:8px;font-weight:700;color:var(--label);text-align:right;max-width:110px;}
#ins-delete{
  margin-top:8px;width:100%;font-family:'Share Tech Mono',monospace;font-size:8px;
  padding:4px;border:1px solid var(--delete-red);background:transparent;
  color:var(--delete-red);cursor:pointer;letter-spacing:1px;text-transform:uppercase;
  transition:all 0.2s;
}
#ins-delete:hover{background:var(--delete-red);color:#fff;}

/* ── WIRE PREVIEW OVERLAY ── */
#wire-hint{
  position:absolute;bottom:10px;left:50%;transform:translateX(-50%);
  background:var(--toolbar-bg);border:1px solid var(--border);
  padding:5px 14px;font-family:'Share Tech Mono',monospace;font-size:8px;
  color:var(--accent);letter-spacing:2px;z-index:200;pointer-events:none;
  display:none;text-transform:uppercase;
}

/* ── THEME FLASH ── */
.t-flash{position:fixed;inset:0;background:var(--accent);opacity:0;pointer-events:none;z-index:9999;transition:opacity 0.12s;}
.t-flash.on{opacity:0.07;}

/* ── CORNER MARKS ── */
.corner-mark{position:absolute;width:14px;height:14px;pointer-events:none;z-index:5;}
.corner-mark svg{width:100%;height:100%;}
.cm-tl{top:6px;left:6px;}
.cm-tr{top:6px;right:6px;transform:scaleX(-1);}
.cm-bl{bottom:6px;left:6px;transform:scaleY(-1);}
.cm-br{bottom:6px;right:6px;transform:scale(-1,-1);}

/* animations */
@keyframes dashFlow{to{stroke-dashoffset:-16;}}
.wire-animated{animation:dashFlow 1.6s linear infinite;}
@keyframes blockIn{from{opacity:0;transform:scale(0.92);}to{opacity:1;transform:scale(1);}}
.block-appear{animation:blockIn 0.2s ease both;}

/* callout number bubbles */
.callout-num{
  font-family:'Courier Prime',monospace;font-size:10px;font-weight:700;
  fill:var(--label);pointer-events:none;
}
</style>
</head>

// flat lookup
const BLOCK_MAP = {};
CATEGORIES.forEach(cat => cat.blocks.forEach(b => { BLOCK_MAP[b.id] = b; }));

// ══════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════
let blocks = [];      // {uid, defId, x, y, w, h, el}
let wires = [];       // {uid, fromUid, toUid, el}
let callouts = [];    // {uid, x, y, lx, ly, num, el}
let calloutCounter = 1;
let selectedBlock = null;
let mode = 'select'; // select | wire | callout
let wireFromUid = null;
let dark = false;
let zoom = 1;
let panX = 0, panY = 0;
let isDraggingBlock = false;
let isPanning = false;
let dragOffset = {x:0,y:0};
let panStart = {x:0,y:0};
let calloutPhase = 0; // 0=pick anchor, 1=pick label pos
let pendingCallout = null;

const svg = document.getElementById('svg-canvas');
const wiresLayer = document.getElementById('wires-layer');
const blocksLayer = document.getElementById('blocks-layer');
const calloutsLayer = document.getElementById('callouts-layer');
const inspector = document.getElementById('inspector');
const wireHint = document.getElementById('wire-hint');
const statusBar = document.getElementById('status-bar');

// ══════════════════════════════════════════════════════
// BUILD SIDEBAR
// ══════════════════════════════════════════════════════
const blockList = document.getElementById('block-list');
CATEGORIES.forEach(cat => {
  const catEl = document.createElement('div');
  catEl.className = 'block-category';
  catEl.textContent = cat.name;
  blockList.appendChild(catEl);
  cat.blocks.forEach(b => {
    const item = document.createElement('div');
    item.className = 'block-item';
    item.draggable = true;
    item.dataset.defId = b.id;
    item.innerHTML = `<div class="bi-swatch" style="background:${b.fill}"></div><div class="bi-label">${b.label}<br><span style="font-size:6.5px;opacity:0.6">${b.sub}</span></div>`;
    item.addEventListener('dragstart', e => {
      e.dataTransfer.setData('defId', b.id);
    });
    // touch drag for mobile
    item.addEventListener('touchstart', onSidebarTouchStart, {passive:false});
    blockList.appendChild(item);
  });
});

// ══════════════════════════════════════════════════════
// COORDINATE HELPERS
// ══════════════════════════════════════════════════════
function getCanvasPoint(clientX, clientY) {
  const rect = svg.getBoundingClientRect();
  return {
    x: (clientX - rect.left - panX) / zoom,
    y: (clientY - rect.top  - panY) / zoom,
  };
}
function snap(v, g=8) { return Math.round(v/g)*g; }
function applyTransform() {
  blocksLayer.setAttribute('transform', `translate(${panX},${panY}) scale(${zoom})`);
  wiresLayer.setAttribute('transform', `translate(${panX},${panY}) scale(${zoom})`);
  calloutsLayer.setAttribute('transform', `translate(${panX},${panY}) scale(${zoom})`);
}

// ══════════════════════════════════════════════════════
// BLOCK RENDERING
// ══════════════════════════════════════════════════════
function renderBlock(b) {
  const def = BLOCK_MAP[b.defId];
  const g = document.createElementNS('http://www.w3.org/2000/svg','g');
  g.setAttribute('class','chip-block block-appear');
  g.dataset.uid = b.uid;

  // main rect
  const rect = document.createElementNS('http://www.w3.org/2000/svg','rect');
  rect.setAttribute('class','block-rect');
  rect.setAttribute('x', b.x); rect.setAttribute('y', b.y);
  rect.setAttribute('width', b.w); rect.setAttribute('height', b.h);
  rect.setAttribute('fill', def.fill);
  rect.setAttribute('stroke', 'var(--block-stroke)');
  rect.setAttribute('stroke-width', '1');
  rect.setAttribute('rx','1');
  g.appendChild(rect);

  // hatch overlay
  const hatch = document.createElementNS('http://www.w3.org/2000/svg','rect');
  hatch.setAttribute('x', b.x); hatch.setAttribute('y', b.y);
  hatch.setAttribute('width', b.w); hatch.setAttribute('height', b.h);
  hatch.setAttribute('fill', `url(#${def.hatch})`);
  hatch.setAttribute('rx','1');
  g.appendChild(hatch);

  // inner dashed rect
  const inner = document.createElementNS('http://www.w3.org/2000/svg','rect');
  inner.setAttribute('class','block-inner');
  inner.setAttribute('x', b.x+5); inner.setAttribute('y', b.y+5);
  inner.setAttribute('width', b.w-10); inner.setAttribute('height', b.h-10);
  inner.setAttribute('fill','none');
  inner.setAttribute('stroke','var(--block-stroke)');
  inner.setAttribute('stroke-width','0.4');
  inner.setAttribute('stroke-dasharray','2,2');
  inner.setAttribute('opacity','0.4');
  g.appendChild(inner);

  // label
  const txt = document.createElementNS('http://www.w3.org/2000/svg','text');
  txt.setAttribute('x', b.x + b.w/2);
  txt.setAttribute('y', b.y + b.h/2 - 4);
  txt.setAttribute('text-anchor','middle');
  txt.setAttribute('dominant-baseline','middle');
  txt.setAttribute('font-family','Share Tech Mono, monospace');
  txt.setAttribute('font-size', Math.min(11, b.w/12));
  txt.setAttribute('fill','var(--label)');
  txt.setAttribute('letter-spacing','1');
  txt.setAttribute('pointer-events','none');
  txt.textContent = def.label;
  g.appendChild(txt);

  // sub-label
  const sub = document.createElementNS('http://www.w3.org/2000/svg','text');
  sub.setAttribute('x', b.x + b.w/2);
  sub.setAttribute('y', b.y + b.h/2 + 12);
  sub.setAttribute('text-anchor','middle');
  sub.setAttribute('dominant-baseline','middle');
  sub.setAttribute('font-family','Courier Prime, monospace');
  sub.setAttribute('font-size', Math.min(8, b.w/18));
  sub.setAttribute('fill','var(--sublabel)');
  sub.setAttribute('pointer-events','none');
  sub.setAttribute('font-style','italic');
  sub.textContent = def.sub;
  g.appendChild(sub);

  // resize handle
  const rh = document.createElementNS('http://www.w3.org/2000/svg','rect');
  rh.setAttribute('x', b.x+b.w-8); rh.setAttribute('y', b.y+b.h-8);
  rh.setAttribute('width',8); rh.setAttribute('height',8);
  rh.setAttribute('fill','var(--accent)'); rh.setAttribute('opacity','0.6');
  rh.setAttribute('cursor','se-resize');
  rh.setAttribute('rx','1');
  rh.dataset.resize = b.uid;
  g.appendChild(rh);

  // wire port dots
  [[b.x+b.w/2, b.y],[b.x+b.w/2,b.y+b.h],[b.x,b.y+b.h/2],[b.x+b.w,b.y+b.h/2]].forEach(([px,py]) => {
    const port = document.createElementNS('http://www.w3.org/2000/svg','circle');
    port.setAttribute('cx',px); port.setAttribute('cy',py);
    port.setAttribute('r',3); port.setAttribute('fill','var(--accent)');
    port.setAttribute('opacity','0'); port.setAttribute('cursor','crosshair');
    port.setAttribute('class','wire-port');
    port.dataset.blockUid = b.uid;
    g.appendChild(port);
  });

  g.addEventListener('mousedown', onBlockMousedown);
  g.addEventListener('touchstart', onBlockTouchstart, {passive:false});
  blocksLayer.appendChild(g);
  b.el = g;

  // show ports on hover if in wire mode
  g.addEventListener('mouseenter', () => {
    if (mode==='wire') g.querySelectorAll('.wire-port').forEach(p=>p.setAttribute('opacity','0.8'));
  });
  g.addEventListener('mouseleave', () => {
    g.querySelectorAll('.wire-port').forEach(p=>p.setAttribute('opacity','0'));
  });
}

function refreshBlock(b) {
  if (b.el) b.el.remove();
  renderBlock(b);
  // reselect visually
  if (selectedBlock && selectedBlock.uid === b.uid) {
    b.el.classList.add('selected');
  }
  // update wires that connect to this block
  wires.forEach(w => {
    if (w.fromUid===b.uid || w.toUid===b.uid) renderWire(w);
  });
}

// ══════════════════════════════════════════════════════
// WIRE RENDERING
// ══════════════════════════════════════════════════════
function blockCenter(uid) {
  const b = blocks.find(x=>x.uid===uid);
  if (!b) return {x:0,y:0};
  return {x: b.x+b.w/2, y: b.y+b.h/2};
}

function renderWire(w) {
  if (w.el) w.el.remove();
  const a = blockCenter(w.fromUid);
  const b2 = blockCenter(w.toUid);
  const path = document.createElementNS('http://www.w3.org/2000/svg','path');
  // orthogonal routing
  const mx = (a.x+b2.x)/2;
  const d = `M ${a.x} ${a.y} L ${mx} ${a.y} L ${mx} ${b2.y} L ${b2.x} ${b2.y}`;
  path.setAttribute('d', d);
  path.setAttribute('class','wire-path wire-animated');
  path.setAttribute('stroke-dasharray','6,3');
  path.setAttribute('marker-end', dark ? 'url(#arr-fwd-d)' : 'url(#arr-fwd)');
  path.dataset.wireUid = w.uid;
  path.addEventListener('click', () => {
    if (mode==='select') {
      if (confirm('Delete this wire?')) {
        path.remove();
        wires = wires.filter(x=>x.uid!==w.uid);
        updateStatus();
      }
    }
  });
  wiresLayer.appendChild(path);
  w.el = path;
}

// ══════════════════════════════════════════════════════
// CALLOUT RENDERING
// ══════════════════════════════════════════════════════
function renderCallout(c) {
  if (c.el) c.el.remove();
  const g = document.createElementNS('http://www.w3.org/2000/svg','g');
  const line = document.createElementNS('http://www.w3.org/2000/svg','line');
  line.setAttribute('x1',c.x); line.setAttribute('y1',c.y);
  line.setAttribute('x2',c.lx); line.setAttribute('y2',c.ly);
  line.setAttribute('stroke','var(--ink)'); line.setAttribute('stroke-width','0.7');
  g.appendChild(line);
  const dot = document.createElementNS('http://www.w3.org/2000/svg','circle');
  dot.setAttribute('cx',c.x); dot.setAttribute('cy',c.y);
  dot.setAttribute('r','2.5'); dot.setAttribute('fill','var(--ink)');
  g.appendChild(dot);
  const num = document.createElementNS('http://www.w3.org/2000/svg','text');
  const side = c.lx >= c.x ? 1 : -1;
  num.setAttribute('x', c.lx + side*5);
  num.setAttribute('y', c.ly);
  num.setAttribute('text-anchor', side>0 ? 'start' : 'end');
  num.setAttribute('dominant-baseline','middle');
  num.setAttribute('font-family','Courier Prime, monospace');
  num.setAttribute('font-size','13');
  num.setAttribute('font-weight','700');
  num.setAttribute('fill','var(--label)');
  num.setAttribute('class','callout-num');
  num.textContent = c.num;
  g.appendChild(num);
  g.dataset.calloutUid = c.uid;
  g.addEventListener('click', ()=>{
    if (mode==='select') {
      if (confirm('Delete callout?')) { g.remove(); callouts=callouts.filter(x=>x.uid!==c.uid); }
    }
  });
  calloutsLayer.appendChild(g);
  c.el = g;
}

// ══════════════════════════════════════════════════════
// INSPECTOR
// ══════════════════════════════════════════════════════
function showInspector(b) {
  selectedBlock = b;
  const def = BLOCK_MAP[b.defId];
  document.getElementById('ins-title').textContent = def.label;
  const rows = document.getElementById('ins-rows');
  rows.innerHTML = '';
  Object.entries(def.specs).forEach(([k,v]) => {
    rows.innerHTML += `<div class="ins-row"><span class="ins-key">${k}</span><span class="ins-val">${v}</span></div>`;
  });
  inspector.style.display = 'block';
}
function hideInspector() {
  if (selectedBlock) {
    selectedBlock.el.classList.remove('selected');
    selectedBlock = null;
  }
  inspector.style.display = 'none';
}

document.getElementById('ins-delete').onclick = () => {
  if (!selectedBlock) return;
  selectedBlock.el.remove();
  wires = wires.filter(w => {
    if (w.fromUid===selectedBlock.uid || w.toUid===selectedBlock.uid) { if(w.el) w.el.remove(); return false; }
    return true;
  });
  blocks = blocks.filter(b => b.uid !== selectedBlock.uid);
  hideInspector();
  updateStatus();
};

// ══════════════════════════════════════════════════════
// INTERACTION — BLOCK DRAG
// ══════════════════════════════════════════════════════
let draggingBlock = null;
let resizingBlock = null;
let resizeStart = null;

function onBlockMousedown(e) {
  if (mode !== 'select') return;
  e.preventDefault(); e.stopPropagation();

  // check resize
  const resizeUid = e.target.dataset && e.target.dataset.resize;
  if (resizeUid) {
    resizingBlock = blocks.find(b=>b.uid===resizeUid);
    resizeStart = { mx: e.clientX, my: e.clientY, w: resizingBlock.w, h: resizingBlock.h };
    return;
  }
  // check wire port
  if (e.target.classList && e.target.classList.contains('wire-port')) return;

  const uid = e.currentTarget.dataset.uid;
  const b = blocks.find(x=>x.uid===uid);
  if (!b) return;

  // select
  if (selectedBlock) selectedBlock.el.classList.remove('selected');
  b.el.classList.add('selected');
  showInspector(b);

  const pt = getCanvasPoint(e.clientX, e.clientY);
  draggingBlock = b;
  dragOffset = { x: pt.x - b.x, y: pt.y - b.y };
  isDraggingBlock = true;
}

function onBlockTouchstart(e) {
  if (mode !== 'select') return;
  e.preventDefault(); e.stopPropagation();
  const t = e.touches[0];
  const uid = e.currentTarget.dataset.uid;
  const b = blocks.find(x=>x.uid===uid);
  if (!b) return;
  if (selectedBlock) selectedBlock.el.classList.remove('selected');
  b.el.classList.add('selected');
  showInspector(b);
  const pt = getCanvasPoint(t.clientX, t.clientY);
  draggingBlock = b;
  dragOffset = { x: pt.x - b.x, y: pt.y - b.y };
  isDraggingBlock = true;
}

// ══════════════════════════════════════════════════════
// INTERACTION — CANVAS EVENTS
// ══════════════════════════════════════════════════════
let canvasPanStart = null;

svg.addEventListener('mousedown', e => {
  if (e.target === svg || e.target.id === 'svg-canvas') {
    if (mode === 'select') {
      // start pan
      isPanning = true;
      canvasPanStart = { x: e.clientX - panX, y: e.clientY - panY };
      hideInspector();
    } else if (mode === 'callout') {
      const pt = getCanvasPoint(e.clientX, e.clientY);
      if (calloutPhase === 0) {
        pendingCallout = {x: pt.x, y: pt.y};
        calloutPhase = 1;
        wireHint.textContent = 'NOW CLICK TO PLACE THE LABEL NUMBER';
      } else {
        const c = { uid: uid(), num: calloutCounter++, x: pendingCallout.x, y: pendingCallout.y, lx: pt.x, ly: pt.y };
        callouts.push(c);
        renderCallout(c);
        calloutPhase = 0; pendingCallout = null;
        wireHint.textContent = 'CLICK ANYWHERE TO START CALLOUT';
      }
    }
  }
});

svg.addEventListener('mousemove', e => {
  if (isPanning && canvasPanStart) {
    panX = e.clientX - canvasPanStart.x;
    panY = e.clientY - canvasPanStart.y;
    applyTransform();
    return;
  }
  if (isDraggingBlock && draggingBlock) {
    const pt = getCanvasPoint(e.clientX, e.clientY);
    draggingBlock.x = snap(pt.x - dragOffset.x);
    draggingBlock.y = snap(pt.y - dragOffset.y);
    refreshBlock(draggingBlock);
    return;
  }
  if (resizingBlock && resizeStart) {
    const dx = (e.clientX - resizeStart.mx) / zoom;
    const dy = (e.clientY - resizeStart.my) / zoom;
    resizingBlock.w = Math.max(80, snap(resizeStart.w + dx));
    resizingBlock.h = Math.max(40, snap(resizeStart.h + dy));
    refreshBlock(resizingBlock);
    return;
  }
  // wire preview line
  if (mode === 'wire' && wireFromUid) {
    const c = blockCenter(wireFromUid);
    const pt = getCanvasPoint(e.clientX, e.clientY);
    const pl = document.getElementById('wire-preview-line');
    pl.setAttribute('x1', c.x + panX/zoom); pl.setAttribute('y1', c.y + panY/zoom);
    pl.setAttribute('x2', pt.x + panX/zoom); pl.setAttribute('y2', pt.y + panY/zoom);
  }
});

document.addEventListener('mouseup', () => {
  isDraggingBlock = false; draggingBlock = null;
  resizingBlock = null; resizeStart = null;
  isPanning = false; canvasPanStart = null;
});

// Touch pan
svg.addEventListener('touchstart', e => {
  if (e.touches.length === 1 && !isDraggingBlock) {
    const t = e.touches[0];
    if (e.target === svg || e.target.id === 'svg-canvas') {
      isPanning = true;
      canvasPanStart = { x: t.clientX - panX, y: t.clientY - panY };
    }
  }
}, {passive:true});
svg.addEventListener('touchmove', e => {
  if (e.touches.length === 1) {
    const t = e.touches[0];
    if (isPanning && canvasPanStart) {
      panX = t.clientX - canvasPanStart.x;
      panY = t.clientY - canvasPanStart.y;
      applyTransform();
    }
    if (isDraggingBlock && draggingBlock) {
      const pt = getCanvasPoint(t.clientX, t.clientY);
      draggingBlock.x = snap(pt.x - dragOffset.x);
      draggingBlock.y = snap(pt.y - dragOffset.y);
      refreshBlock(draggingBlock);
    }
  }
}, {passive:true});
svg.addEventListener('touchend', () => {
  isDraggingBlock = false; draggingBlock = null;
  isPanning = false; canvasPanStart = null;
});

// ── WIRE MODE CLICKS ──
svg.addEventListener('click', e => {
  if (mode !== 'wire') return;
  const blockEl = e.target.closest('.chip-block');
  if (!blockEl) return;
  const uid2 = blockEl.dataset.uid;
  if (!wireFromUid) {
    wireFromUid = uid2;
    blockEl.classList.add('selected');
    document.getElementById('wire-preview-line').style.display = 'block';
    wireHint.textContent = 'CLICK TARGET BLOCK TO CONNECT';
  } else if (wireFromUid !== uid2) {
    const w = { uid: uid(), fromUid: wireFromUid, toUid: uid2 };
    wires.push(w);
    renderWire(w);
    blocks.find(b=>b.uid===wireFromUid)?.el.classList.remove('selected');
    wireFromUid = null;
    document.getElementById('wire-preview-line').style.display = 'none';
    wireHint.textContent = 'CLICK BLOCK TO START WIRE · CLICK ANOTHER TO CONNECT';
    updateStatus();
  }
});

// ── DRAG FROM SIDEBAR ──
const canvasWrap = document.getElementById('canvas-wrap');
canvasWrap.addEventListener('dragover', e => e.preventDefault());
canvasWrap.addEventListener('drop', e => {
  e.preventDefault();
  const defId = e.dataTransfer.getData('defId');
  if (!defId) return;
  const def = BLOCK_MAP[defId];
  const pt = getCanvasPoint(e.clientX, e.clientY);
  const b = { uid: uid(), defId, x: snap(pt.x - def.w/2), y: snap(pt.y - def.h/2), w: def.w, h: def.h };
  blocks.push(b);
  renderBlock(b);
  updateStatus();
});

// ── TOUCH DRAG FROM SIDEBAR (mobile) ──
let touchDragDefId = null;
let touchDragGhost = null;
function onSidebarTouchStart(e) {
  touchDragDefId = e.currentTarget.dataset.defId;
  const t = e.touches[0];
  touchDragGhost = document.createElement('div');
  touchDragGhost.style.cssText = `position:fixed;pointer-events:none;z-index:9998;background:var(--paper2);border:1px solid var(--border);padding:4px 8px;font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--accent);opacity:0.8;letter-spacing:1px;`;
  touchDragGhost.textContent = BLOCK_MAP[touchDragDefId].label;
  document.body.appendChild(touchDragGhost);
}
document.addEventListener('touchmove', e => {
  if (!touchDragDefId) return;
  const t = e.touches[0];
  if (touchDragGhost) {
    touchDragGhost.style.left = (t.clientX+10)+'px';
    touchDragGhost.style.top = (t.clientY-20)+'px';
  }
},{passive:true});
document.addEventListener('touchend', e => {
  if (!touchDragDefId) return;
  const t = e.changedTouches[0];
  if (touchDragGhost) { touchDragGhost.remove(); touchDragGhost=null; }
  const rect = svg.getBoundingClientRect();
  if (t.clientX >= rect.left && t.clientX <= rect.right && t.clientY >= rect.top && t.clientY <= rect.bottom) {
    const def = BLOCK_MAP[touchDragDefId];
    const pt = getCanvasPoint(t.clientX, t.clientY);
    const b = { uid: uid(), defId: touchDragDefId, x: snap(pt.x-def.w/2), y: snap(pt.y-def.h/2), w:def.w, h:def.h };
    blocks.push(b); renderBlock(b); updateStatus();
  }
  touchDragDefId = null;
});

// ══════════════════════════════════════════════════════
// TOOLBAR BUTTONS
// ══════════════════════════════════════════════════════
function setMode(m) {
  mode = m;
  wireFromUid = null;
  calloutPhase = 0; pendingCallout = null;
  document.getElementById('wire-preview-line').style.display = 'none';
  ['btn-select','btn-wire','btn-callout'].forEach(id=>document.getElementById(id).classList.remove('active'));
  if (m==='select') { document.getElementById('btn-select').classList.add('active'); wireHint.style.display='none'; }
  if (m==='wire')   { document.getElementById('btn-wire').classList.add('active'); wireHint.style.display='block'; wireHint.textContent='CLICK BLOCK TO START WIRE · CLICK ANOTHER TO CONNECT'; }
  if (m==='callout'){ document.getElementById('btn-callout').classList.add('active'); wireHint.style.display='block'; wireHint.textContent='CLICK ANYWHERE TO START CALLOUT'; }
}

document.getElementById('btn-select').onclick  = () => setMode('select');
document.getElementById('btn-wire').onclick    = () => setMode('wire');
document.getElementById('btn-callout').onclick = () => setMode('callout');

document.getElementById('btn-zoomin').onclick  = () => { zoom = Math.min(zoom*1.25, 4); applyTransform(); };
document.getElementById('btn-zoomout').onclick = () => { zoom = Math.max(zoom/1.25, 0.2); applyTransform(); };
document.getElementById('btn-fit').onclick     = () => { zoom=1; panX=0; panY=0; applyTransform(); };

// mousewheel zoom
canvasWrap.addEventListener('wheel', e => {
  e.preventDefault();
  const factor = e.deltaY < 0 ? 1.1 : 0.9;
  zoom = Math.min(4, Math.max(0.2, zoom * factor));
  applyTransform();
}, {passive:false});

document.getElementById('btn-clearall').onclick = () => {
  if (!confirm('Clear everything?')) return;
  blocks=[]; wires=[]; callouts=[]; calloutCounter=1;
  blocksLayer.innerHTML=''; wiresLayer.innerHTML=''; calloutsLayer.innerHTML='';
  hideInspector(); updateStatus();
};

// THEME
document.getElementById('btn-theme').onclick = () => {
  const f = document.getElementById('tflash');
  f.classList.add('on');
  setTimeout(()=>f.classList.remove('on'),120);
  setTimeout(()=>{
    dark = !dark;
    document.body.setAttribute('data-theme', dark?'dark':'');
    document.getElementById('btn-theme').textContent = dark ? '○ Light' : '◐ Dark';
  }, 60);
};

// EXPORT
document.getElementById('btn-export').onclick = () => {
  const clone = svg.cloneNode(true);
  const rect = svg.getBoundingClientRect();
  clone.setAttribute('xmlns','http://www.w3.org/2000/svg');
  clone.setAttribute('width', rect.width); clone.setAttribute('height', rect.height);
  // embed fonts
  const style = document.createElementNS('http://www.w3.org/2000/svg','style');
  style.textContent = `@import url('https://fonts.googleapis.com/css2?family=Special+Elite&family=Share+Tech+Mono&family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap');`;
  clone.insertBefore(style, clone.firstChild);
  const blob = new Blob([clone.outerHTML],{type:'image/svg+xml'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download='chip-design.svg'; a.click();
};

// keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.key==='s'||e.key==='S') setMode('select');
  if (e.key==='w'||e.key==='W') setMode('wire');
  if (e.key==='c'||e.key==='C') setMode('callout');
  if (e.key==='+'||e.key==='=') { zoom=Math.min(zoom*1.2,4); applyTransform(); }
  if (e.key==='-') { zoom=Math.max(zoom/1.2,0.2); applyTransform(); }
  if (e.key==='f'||e.key==='F') { zoom=1;panX=0;panY=0;applyTransform(); }
  if ((e.key==='Delete'||e.key==='Backspace') && selectedBlock) document.getElementById('ins-delete').click();
  if (e.key==='Escape') { setMode('select'); hideInspector(); }
});

// ══════════════════════════════════════════════════════
// UTILS
// ══════════════════════════════════════════════════════
let _uid = 1;
function uid() { return 'b' + (_uid++); }

function updateStatus() {
  statusBar.textContent = `BLOCKS: ${blocks.length} · WIRES: ${wires.length} · MODE: ${mode.toUpperCase()}`;
}
updateStatus();
applyTransform();
</script>
</body>
</html>
